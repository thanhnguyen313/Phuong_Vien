<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 Happy Birthday Phương Viên 🎂</title>
    <meta name="description" content="Chúc mừng sinh nhật Phương Viên - Trang web chúc mừng sinh nhật đặc biệt">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Pacifico&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-heart">💖</div>
            <p class="loading-text">Đang chuẩn bị điều bất ngờ...</p>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="hidden">
        <!-- Stars Background -->
        <div id="stars-container"></div>

        <!-- Canvas for Particle Heart -->
        <canvas id="heartCanvas"></canvas>

        <!-- Birthday Message Overlay -->
        <div id="birthday-overlay">
            <h1 class="birthday-title" id="birthday-title">
                <span class="title-line">Happy Birthday</span>
                <span class="title-name">Phương Viên</span>
            </h1>
            <p class="birthday-wish" id="birthday-wish">
                🎂 Chúc em một ngày sinh nhật thật vui vẻ và hạnh phúc! 🎂
            </p>
        </div>

        <!-- Click instruction -->




        <!-- Floating messages -->
        <div id="floating-messages"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
